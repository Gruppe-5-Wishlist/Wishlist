<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account — EcoWish</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

    <link rel="stylesheet" th:href="@{/styles.css}" />

    <link rel="stylesheet" th:href="@{/login.css}" />

</head>

<body>
<nav id="navbar">
    <a th:href="@{/}" class="logo">
        <span class="logo-icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.5 7 3 11 3 15a9 9 0 0018 0c0-4-3.5-8-9-13zM8 17a4 4 0 004-4c0-2-1.5-4-4-6-2.5 2-4 4-4 6a4 4 0 004 4z"/>
            </svg>
        </span>
        <span class="logo-text">EcoWish</span>
    </a>

    <ul class="nav-links">
        <li><a href="/#how">How it works</a></li>
        <li><a href="/#features">Features</a></li>
        <li><a href="/#about">About us</a></li>
        <li><a th:href="@{/user/login}" class="btn-login">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 3h6v18h-6M10 17l5-5-5-5M15 12H3"/>
            </svg>
            Log in
        </a></li>
    </ul>
</nav>

<main class="login-wrapper">
    <div class="login-card">

        <h2 class="login-title">Create an account</h2>

        <form th:object="${user}" th:action="@{/user/save}" th:method="post" class="login-form">

            <span class="field-label">Your details</span>

            <input
                    type="text"
                    th:field="*{userName}"
                    placeholder="Full name"
                    required
                    autocomplete="name"
            />

            <input
                    type="email"
                    th:field="*{userEmail}"
                    placeholder="Email address"
                    required
                    autocomplete="email"
            />

            <span class="field-label">Security</span>

            <input
                    type="password"
                    th:field="*{userPassword}"
                    placeholder="Password"
                    required
                    autocomplete="new-password"
                    minlength="6"
            />

            <div class="login-actions">
                <button type="submit" class="btn-primary btn-full">
                    Create account
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>

                <a th:href="@{/user/login}" class="btn-secondary btn-full btn-outline" style="justify-content:center; text-decoration:none;">
                    Back to login
                </a>
            </div>
        </form>

        <p class="form-footer">
            By creating an account you agree to our
            <a href="#">terms of service</a>.
        </p>

    </div>
</main>

</body>
</html>
