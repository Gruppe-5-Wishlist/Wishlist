<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Wishlist — EcoWish</title>

    <!-- Fonts (same as your site) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

    <!-- Main stylesheet -->
    <link rel="stylesheet" th:href="@{/styles.css}" />

    <!-- Page-specific styles -->
    <style>
        .wishlist-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 1.5rem 2rem;
            flex-direction: column;
            text-align: center;
        }

        .wishlist-title {
            font-family: 'Fraunces', serif;
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--text);
        }

        .wishlist-box {
            width: 100%;
            max-width: 600px;
            height: 320px;
            border-radius: 18px;
            background: var(--white);
            border: 2px dashed rgba(90, 122, 92, 0.35);
            box-shadow: 0 12px 40px rgba(46, 74, 47, 0.08);
        }

        .wishlist-sub {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--muted);
        }
    </style>
</head>

<body>

<!-- NAVBAR (optional but keeps consistency) -->
<nav id="navbar">
    <a th:href="@{/}" class="logo">
      <span class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 2C6.5 7 3 11 3 15a9 9 0 0018 0c0-4-3.5-8-9-13zM8 17a4 4 0 004-4c0-2-1.5-4-4-6-2.5 2-4 4-4 6a4 4 0 004 4z"/>
        </svg>
      </span>
        <span class="logo-text">EcoWish</span>
    </a>
</nav>

<!-- MAIN CONTENT -->
<main class="wishlist-wrapper">
    <h1 class="wishlist-title">Here is your wishlist</h1>

    <div class="wishlist-box"></div>

    <p class="wishlist-sub">This is a temporary placeholder for testing endpoints.</p>
</main>

</body>
</html>
