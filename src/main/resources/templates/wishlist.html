<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Wishlists — EcoWish</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

    <link rel="stylesheet" th:href="@{/styles.css}" />

    <style>
        /* ─── NAV USER ELEMENTS ─── */
        .nav-avatar {
            display: inline-flex;
            align-items: flex-end;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--sage);
            color: var(--white);
            text-decoration: none;
            overflow: hidden;
            transition: background 0.2s, transform 0.15s;
            box-shadow: 0 2px 8px rgba(46, 74, 47, 0.18);
        }

        .nav-avatar:hover {
            background: var(--moss);
            transform: scale(1.08);
        }

        .nav-avatar svg {
            width: 28px;
            height: 28px;
            stroke: var(--white);
            fill: none;
            flex-shrink: 0;
            margin-bottom: -4px;
        }

        .btn-logout {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            color: var(--muted) !important;
            border: 1.5px solid rgba(90, 122, 92, 0.25);
            padding: 0.45rem 1rem !important;
            border-radius: 999px !important;
            font-size: 0.875rem !important;
            font-weight: 500 !important;
            text-decoration: none;
            transition: border-color 0.2s, color 0.2s, background 0.2s !important;
        }

        .btn-logout:hover {
            border-color: var(--sage) !important;
            color: var(--moss) !important;
            background: rgba(90, 122, 92, 0.07) !important;
        }

        /* ─── PAGE LAYOUT ─── */
        .wishlist-wrapper {
            min-height: 100vh;
            padding: 100px 2.5rem 4rem;
        }

        .wishlist-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .wishlist-title {
            font-family: 'Fraunces', serif;
            font-size: 1.6rem;
            color: var(--text);
            margin: 0;
        }

        .add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--moss);
            color: #fff;
            font-size: 1.6rem;
            font-weight: 300;
            text-decoration: none;
            line-height: 1;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(46, 74, 47, 0.25);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .add-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(46, 74, 47, 0.35);
        }

        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.25rem;
        }

        .wishlist-card {
            text-decoration: none;
            color: var(--text);
            display: block;
        }

        .wishlist-card-inner {
            border-radius: 16px;
            background: var(--cream);
            border: 1px solid rgba(90, 122, 92, 0.15);
            height: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 16px rgba(46, 74, 47, 0.08);
            padding: 1.5rem;
        }

        .wishlist-card:hover .wishlist-card-inner {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(46, 74, 47, 0.14);
        }

        .wishlist-card-icon {
            font-size: 2.5rem;
            opacity: 0.4;
            margin-bottom: 0.75rem;
        }

        .wishlist-card-name {
            font-family: 'Fraunces', serif;
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--text);
            text-align: center;
        }

        .wishlist-card-count {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(4px);
            border-radius: 999px;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
        }

        .wishlist-empty {
            padding: 3.5rem 2rem;
            text-align: center;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
        }

        .wishlist-empty span {
            display: block;
            font-size: 2rem;
            margin-bottom: 0.75rem;
            opacity: 0.5;
        }

        @media (max-width: 900px) {
            .wishlist-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 600px) {
            .wishlist-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

<body>

<nav id="navbar">
    <a th:href="@{/wishlist}" class="logo">
        <span class="logo-icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.5 7 3 11 3 15a9 9 0 0018 0c0-4-3.5-8-9-13zM8 17a4 4 0 004-4c0-2-1.5-4-4-6-2.5 2-4 4-4 6a4 4 0 004 4z"/>
            </svg>
        </span>
        <span class="logo-text">EcoWish</span>
    </a>

    <ul class="nav-links">
        <li>
            <a th:href="@{/user/profile}" class="nav-avatar" title="Profile">
                <svg viewBox="0 0 24 24" fill="white" stroke="none">
                    <circle cx="12" cy="7" r="4"/>
                    <path d="M4 21c0-4.418 3.582-8 8-8s8 3.582 8 8"/>
                </svg>
            </a>
        </li>
        <li>
            <a th:href="@{/user/logout}" class="btn-logout">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
                </svg>
                Log out
            </a>
        </li>
    </ul>
</nav>

<main class="wishlist-wrapper">

    <div class="wishlist-header">
        <h1 class="wishlist-title">My wishlists</h1>
        <button class="add-btn" onclick="openModal()" title="Create new wishlist">+</button>
    </div>

    <div class="wishlist-empty" th:if="${wishlists == null or wishlists.isEmpty()}">
        <span>🌱</span>
        No wishlists yet — create your first one!
    </div>

    <div class="wishlist-grid" th:if="${wishlists != null and !wishlists.isEmpty()}">
        <a class="wishlist-card"
           th:each="wishlist : ${wishlists}"
           th:href="@{'/wishlist/' + ${wishlist.wishlistId}}">
            <div class="wishlist-card-inner">
                <div class="wishlist-card-count" th:text="${wishlist.wishes.size()}">0</div>
                <span class="wishlist-card-icon">🌿</span>
                <div class="wishlist-card-name" th:text="${wishlist.wishlistName}">Wishlist name</div>
            </div>
        </a>
    </div>

</main>

<div id="wishlistModal"
     style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
     background:rgba(0,0,0,0.5); z-index:999;">

    <div style="background:white; padding:25px; width:320px;
                margin:120px auto; border-radius:12px; text-align:center;">

        <h3>Create Wishlist</h3>

        <form action="/wishlist/add" method="post">
            <input
                    type="text"
                    name="wishlistName"
                    placeholder="Enter wishlist name"
                    required
                    style="width:100%; padding:8px; margin-top:10px;"
            />

            <br><br>

            <button type="submit">Create</button>
            <button type="button" onclick="closeModal()">Cancel</button>
        </form>

    </div>
</div>

<script>
    const nav = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
        nav.classList.toggle('scrolled', window.scrollY > 10);
    });

    function openModal() {
        document.getElementById("wishlistModal").style.display = "block";
    }

    function closeModal() {
        document.getElementById("wishlistModal").style.display = "none";
    }
</script>
</body>
</html>
