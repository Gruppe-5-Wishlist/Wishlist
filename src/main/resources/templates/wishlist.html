<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Wishlists — EcoWish</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

    <link rel="stylesheet" th:href="@{/styles.css}" />

    <style>
        /* ─── NAV USER ELEMENTS ─── */
        .nav-avatar {
            display: inline-flex;
            align-items: flex-end;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--sage);
            color: var(--white);
            text-decoration: none;
            overflow: hidden;
            transition: background 0.2s, transform 0.15s;
            box-shadow: 0 2px 8px rgba(46, 74, 47, 0.18);
        }

        .nav-avatar:hover {
            background: var(--moss);
            transform: scale(1.08);
        }

        .nav-avatar svg {
            width: 28px;
            height: 28px;
            stroke: var(--white);
            fill: none;
            flex-shrink: 0;
            margin-bottom: -4px;
        }

        /* ─── PAGE LAYOUT ─── */
        .wishlist-wrapper {
            min-height: 100vh;
            padding: 100px 2.5rem 4rem;
        }

        .wishlist-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .wishlist-title {
            font-family: 'Fraunces', serif;
            font-size: 1.6rem;
            color: var(--text);
            margin: 0;
        }

        .add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--moss);
            color: #fff;
            font-size: 1.6rem;
            font-weight: 300;
            text-decoration: none;
            line-height: 1;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(46, 74, 47, 0.25);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .add-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(46, 74, 47, 0.35);
        }

        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.25rem;
        }

        .wishlist-card {
            text-decoration: none;
            color: var(--text);
            display: block;
        }

        .wishlist-card-inner {
            border-radius: 16px;
            background: var(--cream);
            border: 1px solid rgba(90, 122, 92, 0.15);
            height: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 16px rgba(46, 74, 47, 0.08);
            padding: 1.5rem;
        }

        .wishlist-card:hover .wishlist-card-inner {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(46, 74, 47, 0.14);
        }

        .wishlist-card-icon {
            font-size: 2.5rem;
            opacity: 0.4;
            margin-bottom: 0.75rem;
        }

        .wishlist-card-name {
            font-family: 'Fraunces', serif;
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--text);
            text-align: center;
        }

        .wishlist-card-count {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(4px);
            border-radius: 999px;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
        }

        .wishlist-empty {
            padding: 3.5rem 2rem;
            text-align: center;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
        }

        .wishlist-empty span {
            display: block;
            font-size: 2rem;
            margin-bottom: 0.75rem;
            opacity: 0.5;
        }

        @media (max-width: 900px) {
            .wishlist-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 600px) {
            .wishlist-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

<body>

<nav id="navbar">
    <a th:href="@{/wishlist}" class="logo">
        <span class="logo-icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.5 7 3 11 3 15a9 9 0 0018 0c0-4-3.5-8-9-13zM8 17a4 4 0 004-4c0-2-1.5-4-4-6-2.5 2-4 4-4 6a4 4 0 004 4z"/>
            </svg>
        </span>
        <span class="logo-text">EcoWish</span>
    </a>

    <ul class="nav-links">
        <li>
            <a th:href="@{/user/profile}" class="nav-avatar" title="Profile">
                <svg viewBox="0 0 24 24" fill="white" stroke="none">
                    <circle cx="12" cy="7" r="4"/>
                    <path d="M4 21c0-4.418 3.582-8 8-8s8 3.582 8 8"/>
                </svg>
            </a>
        </li>
        <li><a th:href="@{/user/logout}">Log out</a></li>
    </ul>
</nav>

<main class="wishlist-wrapper">

    <div class="wishlist-header">
        <h1 class="wishlist-title">My wishlists</h1>
        <button class="add-btn" onclick="openModal()" title="Create new wishlist">+</button>
    </div>

    <div class="wishlist-empty" th:if="${wishlists == null or wishlists.isEmpty()}">
        <span>🌱</span>
        No wishlists yet — create your first one!
    </div>

    <div class="wishlist-grid" th:if="${wishlists != null and !wishlists.isEmpty()}">
        <a class="wishlist-card"
           th:each="wishlist : ${wishlists}"
           th:href="@{'/wishlist/' + ${wishlist.wishlistId}}">
            <div class="wishlist-card-inner">
                <div class="wishlist-card-count" th:text="${wishlist.wishes.size()}">0</div>
                <span class="wishlist-card-icon">🌿</span>
                <div class="wishlist-card-name" th:text="${wishlist.wishlistName}">Wishlist name</div>
            </div>
        </a>
    </div>

</main>

<div id="wishlistModal"
     style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
     background:rgba(30,43,31,0.45); backdrop-filter:blur(4px); z-index:999;
     align-items:center; justify-content:center;">

    <div style="background:var(--white); padding:2.5rem; width:100%; max-width:400px;
                margin:0 auto; border-radius:20px; text-align:left;
                border:1px solid rgba(90,122,92,0.12);
                box-shadow:0 20px 60px rgba(46,74,47,0.18);">

        <h3 style="font-family:'Fraunces',serif; font-size:1.5rem; font-weight:500;
                   color:var(--text); margin-bottom:1.5rem;">
            New wishlist
        </h3>

        <form action="/wishlist/add" method="post"
              style="display:flex; flex-direction:column; gap:1rem;">

            <input
                    type="text"
                    name="wishlistName"
                    placeholder="Wishlist name"
                    required
                    style="padding:0.75rem 1rem; border-radius:10px;
                       border:1px solid rgba(90,122,92,0.2);
                       font-family:'DM Sans',sans-serif; font-size:0.9rem;
                       transition:border 0.2s, box-shadow 0.2s; outline:none;"
                    onfocus="this.style.borderColor='var(--sage)'; this.style.boxShadow='0 0 0 2px rgba(90,122,92,0.1)'"
                    onblur="this.style.borderColor='rgba(90,122,92,0.2)'; this.style.boxShadow='none'"
            />

            <div style="display:flex; flex-direction:column; gap:0.75rem; margin-top:0.5rem;">
                <button type="submit"
                        style="display:inline-flex; align-items:center; justify-content:center; gap:8px;
                               background:var(--moss); color:var(--white);
                               font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:500;
                               padding:0.8rem 1.8rem; border-radius:999px; border:none; cursor:pointer;
                               box-shadow:0 4px 20px rgba(46,74,47,0.2);
                               transition:background 0.2s, transform 0.2s;"
                        onmouseover="this.style.background='var(--sage-dk)'; this.style.transform='translateY(-1px)'"
                        onmouseout="this.style.background='var(--moss)'; this.style.transform='none'">
                    Create wishlist
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>

                <button type="button" onclick="closeModal()"
                        style="display:inline-flex; align-items:center; justify-content:center;
                               background:transparent; color:var(--moss);
                               font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:400;
                               padding:0.8rem 1.5rem; border-radius:999px; cursor:pointer;
                               border:1.5px solid rgba(46,74,47,0.3);
                               transition:border-color 0.2s, background 0.2s;"
                        onmouseover="this.style.borderColor='var(--sage)'; this.style.background='rgba(90,122,92,0.06)'"
                        onmouseout="this.style.borderColor='rgba(46,74,47,0.3)'; this.style.background='transparent'">
                    Cancel
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    const nav = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
        nav.classList.toggle('scrolled', window.scrollY > 10);
    });

    function openModal() {
        document.getElementById("wishlistModal").style.display = "block";
    }

    function closeModal() {
        document.getElementById("wishlistModal").style.display = "none";
    }
</script>
</body>
</html>
