<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile — EcoWish</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

    <link rel="stylesheet" th:href="@{/styles.css}" />
    <link rel="stylesheet" th:href="@{/login.css}" />

</head>

<body>

<nav id="navbar">
    <a th:href="@{/wishlist}" class="logo">
        <span class="logo-icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.5 7 3 11 3 15a9 9 0 0018 0c0-4-3.5-8-9-13zM8 17a4 4 0 004-4c0-2-1.5-4-4-6-2.5 2-4 4-4 6a4 4 0 004 4z"/>
            </svg>
        </span>
        <span class="logo-text">EcoWish</span>
    </a>

    <ul class="nav-links">
        <li><a th:href="@{/wishlist}">My wishlists</a></li>
        <li><a th:href="@{/user/logout}">Log out</a></li>
    </ul>
</nav>

<main class="login-wrapper">
    <div class="login-card">

        <!-- Avatar with initial -->
        <div class="profile-avatar" th:text="${#strings.toUpperCase(#strings.substring(user.userName, 0, 1))}">A</div>

        <h2 class="login-title">Edit Profile</h2>
        <p class="profile-subtitle" th:text="${user.userName}">Your name</p>

        <form th:object="${user}" th:action="@{/user/saveProfile}" th:method="post" class="login-form">

            <!-- Hidden field to preserve userId -->
            <input type="hidden" th:field="*{userId}" />

            <span class="field-label">Personal details</span>

            <input
                    type="text"
                    th:field="*{userName}"
                    placeholder="Full name"
                    required
                    autocomplete="name"
            />

            <input
                    type="email"
                    th:field="*{userEmail}"
                    placeholder="Email address"
                    required
                    autocomplete="email"
            />

            <div class="divider"></div>
            <span class="field-label">Security</span>

            <div class="input-wrapper">
                <input
                        type="password"
                        id="passwordField"
                        th:field="*{userPassword}"
                        placeholder="Password"
                        required
                        autocomplete="new-password"
                        minlength="6"
                />
                <button type="button" class="toggle-pw" onclick="togglePassword()" title="Show/hide password" aria-label="Toggle password visibility">
                    <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>

            <div class="login-actions">
                <button type="submit" class="btn-primary btn-full">
                    Save changes
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>

                <a th:href="@{/wishlist}" class="btn-secondary btn-full btn-outline" style="justify-content:center; text-decoration:none;">
                    Cancel
                </a>
            </div>
        </form>

        <div class="danger-zone">
            <span class="danger-zone-label">Danger zone</span>
            <a th:href="@{/user/delete}" class="btn-danger">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
                    <path d="M10 11v6M14 11v6"/>
                    <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
                </svg>
                Delete account
            </a>
        </div>

        <p class="form-footer">
            <a th:href="@{/wishlist}">← Back to my wishlists</a>
        </p>

    </div>
</main>

<script>
    // Scroll shadow on nav
    const nav = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
        nav.classList.toggle('scrolled', window.scrollY > 10);
    });

    // Password visibility toggle
    function togglePassword() {
        const field = document.getElementById('passwordField');
        const icon  = document.getElementById('eyeIcon');
        if (field.type === 'password') {
            field.type = 'text';
            icon.innerHTML = `
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>`;
        } else {
            field.type = 'password';
            icon.innerHTML = `
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>`;
        }
    }
</script>

</body>
</html>
