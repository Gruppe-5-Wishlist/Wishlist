<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit wish — EcoWish</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

    <link rel="stylesheet" th:href="@{/styles.css}" />
    <link rel="stylesheet" th:href="@{/wish.css}" />
</head>
<body>

<nav id="navbar">
    <a th:href="@{/wishlist}" class="logo">
        <span class="logo-icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.5 7 3 11 3 15a9 9 0 0018 0c0-4-3.5-8-9-13zM8 17a4 4 0 004-4c0-2-1.5-4-4-6-2.5 2-4 4-4 6a4 4 0 004 4z"/>
            </svg>
        </span>
        <span class="logo-text">EcoWish</span>
    </a>

    <ul class="nav-links">
        <li><a th:href="@{/wishlist}">My wishlists</a></li>
        <li><a th:href="@{/user/logout}" class="btn-login">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
            </svg>
            Log out
        </a></li>
    </ul>
</nav>

<main class="wish-wrapper">

    <nav class="breadcrumb" aria-label="Breadcrumb">
        <a th:href="@{/wishlist}">My wishlists</a>
        <span class="breadcrumb-sep">›</span>
        <a th:href="@{'/wishlist/' + ${wish.wishlistId}}">Wishlist</a>
        <span class="breadcrumb-sep">›</span>
        <span class="breadcrumb-current" th:text="${wish.wishName}">Wish name</span>
    </nav>

    <h1 class="wish-page-title">Edit wish</h1>

    <form th:action="@{'/wish/update/' + ${wish.wishId}}" method="post" class="modal-form">

        <span class="field-label">Item</span>
        <input type="text"
               name="wishName"
               th:value="${wish.wishName}"
               placeholder="What do you wish for?"
               required
               autocomplete="off" />

        <span class="field-label">Description</span>
        <textarea name="wishDescription"
                  placeholder="Size, colour, notes…"
                  rows="3"
                  th:text="${wish.wishDescription}"></textarea>

        <span class="field-label">Link</span>
        <input type="url"
               name="wishLink"
               th:value="${wish.wishLink}"
               placeholder="https://shop.example.com/item" />

        <span class="field-label">Price (kr.)</span>
        <input type="number"
               name="wishPrice"
               th:value="${wish.wishPrice}"
               placeholder="0.00"
               step="0.01"
               min="0"
               required />

        <div class="modal-actions">
            <button type="submit" class="btn-modal-submit">Save changes</button>
            <a th:href="@{'/wishlist/' + ${wish.wishlistId}}" class="btn-modal-cancel">Cancel</a>
        </div>
    </form>

</main>

<script>
    const nav = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
        nav.classList.toggle('scrolled', window.scrollY > 10);
    });
</script>

</body>
</html>
