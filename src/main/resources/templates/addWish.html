<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add wish — EcoWish</title>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700&family=DM+Sans:wght@300;400;500&display=swap"
          rel="stylesheet"/>

    <link rel="stylesheet" th:href="@{/styles.css}"/>
    <link rel="stylesheet" th:href="@{/wish.css}"/>
</head>
<body>

<nav id="navbar">
    <a th:href="@{/wishlist}" class="logo">
        <span class="logo-text">EcoWish</span>
    </a>
</nav>

<main class="wish-wrapper">

    <nav class="breadcrumb" aria-label="Breadcrumb">
        <a th:href="@{/wishlist}">My wishlists</a>
        <span class="breadcrumb-sep">›</span>
        <a th:href="@{'/wishlist/' + ${wishlist.wishlistId}}" th:text="${wishlist.wishlistName}">Wishlist</a>
        <span class="breadcrumb-sep">›</span>
        <span class="breadcrumb-current">Add wish</span>
    </nav>

    <h1 class="wish-page-title">Add a wish</h1>

    <form th:action="@{'/wish/add/' + ${wishlist.wishlistId}}" method="post" class="modal-form">
        <span class="field-label">Item</span>
        <input type="text" name="wishName" placeholder="What do you wish for?" required autocomplete="off"/>

        <span class="field-label">Description</span>
        <textarea name="wishDescription" placeholder="Size, colour, notes…" rows="3"></textarea>

        <span class="field-label">Link</span>
        <input type="url" name="wishLink" placeholder="https://shop.example.com/item"/>

        <span class="field-label">Price (kr.)</span>
        <input type="number" name="wishPrice" placeholder="0.00" step="0.01" min="0" value="0" required/>

        <div class="modal-actions">
            <button type="submit" class="btn-modal-submit">Add wish</button>
            <a th:href="@{'/wishlist/' + ${wishlist.wishlistId}}" class="btn-modal-cancel">Cancel</a>
        </div>
    </form>

</main>
</body>
</html>
