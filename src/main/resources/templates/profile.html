<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Profile — EcoWish</title>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700&family=DM+Sans:wght@300;400;500&display=swap"
          rel="stylesheet"/>

    <link rel="stylesheet" th:href="@{/styles.css}"/>
    <link rel="stylesheet" th:href="@{/login.css}"/>

    <style>
        /* ── Avatar ── */
        .profile-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--sage-lt), var(--moss));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fraunces', serif;
            font-size: 1.8rem;
            font-weight: 500;
            color: var(--white);
            margin: 0 auto 1.25rem;
            box-shadow: 0 8px 24px rgba(46, 74, 47, 0.2);
        }

        .login-title {
            text-align: center;
        }

        .profile-tagline {
            text-align: center;
            font-size: 0.82rem;
            color: var(--muted);
            margin-top: -0.75rem;
            margin-bottom: 1.75rem;
        }

        /* ── Info rows ── */
        .profile-fields {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            margin-bottom: 1.75rem;
        }

        .profile-field {
            background: var(--cream);
            border: 1px solid rgba(90, 122, 92, 0.12);
            border-radius: 10px;
            padding: 0.75rem 1rem;
        }

        .profile-field-label {
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--muted);
            margin-bottom: 0.2rem;
        }

        .profile-field-value {
            font-size: 0.95rem;
            color: var(--text);
            font-weight: 400;
        }

        .profile-field-value.masked {
            letter-spacing: 0.15em;
            color: var(--muted);
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: rgba(90, 122, 92, 0.12);
            margin: 0 0 1.5rem;
        }
    </style>
</head>

<body>

<nav id="navbar">
    <a th:href="@{/wishlist}" class="logo">
        <span class="logo-icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.5 7 3 11 3 15a9 9 0 0018 0c0-4-3.5-8-9-13zM8 17a4 4 0 004-4c0-2-1.5-4-4-6-2.5 2-4 4-4 6a4 4 0 004 4z"/>
            </svg>
        </span>
        <span class="logo-text">EcoWish</span>
    </a>

    <ul class="nav-links">
        <li><a th:href="@{/wishlist}">My wishlists</a></li>
        <li><a th:href="@{/user/logout}">Log out</a></li>
    </ul>
</nav>

<main class="login-wrapper">
    <div class="login-card">

        <div class="profile-avatar"
             th:text="${#strings.toUpperCase(#strings.substring(user.userName, 0, 1))}">A
        </div>

        <h2 class="login-title" th:text="${user.userName}">Your Name</h2>
        <p class="profile-tagline">Your profile</p>

        <div class="profile-fields">

            <div class="profile-field">
                <div class="profile-field-label">Full name</div>
                <div class="profile-field-value" th:text="${user.userName}">—</div>
            </div>

            <div class="profile-field">
                <div class="profile-field-label">Email address</div>
                <div class="profile-field-value" th:text="${user.userEmail}">—</div>
            </div>

            <div class="profile-field">
                <div class="profile-field-label">Password</div>
                <div class="profile-field-value masked">••••••••</div>
            </div>

        </div>

        <div class="divider"></div>

        <a th:href="@{/user/profile/edit}" class="btn-primary btn-full"
           style="justify-content:center; text-decoration:none;">
            Edit profile
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
        </a>

    </div>
</main>

<script>
    const nav = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
        nav.classList.toggle('scrolled', window.scrollY > 10);
    });
</script>

</body>
</html>
